    <div id="video-container">

            <source src="" type="video/mp4">

    <div id="home-page">
        <header>

            <div class="center-container">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();

            function fetchBusinessHours(callback) {
                db.collection("business_hours").doc("hours").get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        console.log("📢 Fetched Business Hours:", data);

                        if (!data.openTime || !data.closeTime) {
                            console.error("❌ Missing openTime or closeTime in Firestore!");
                            return;
                        }

                        // Ensure openTime and closeTime are numbers
                        const openTime = parseInt(data.openTime, 10);
                        const closeTime = parseInt(data.closeTime, 10);

                        // Convert HHMM format to hour and minute values
                        const openHour = Math.floor(openTime / 100);
                        const openMinute = openTime % 100;
                        const closeHour = Math.floor(closeTime / 100);
                        const closeMinute = closeTime % 100;

                        console.log(`✅ Open Time: ${openHour}:${openMinute}`);
                        console.log(`✅ Close Time: ${closeHour}:${closeMinute}`);

                        // 🔹 NEW: read openDays array from Firestore (0=Sun ... 6=Sat)
                        const openDays = Array.isArray(data.openDays)
                            ? data.openDays.map(n => parseInt(n, 10))
                            : [];

                        callback({ openHour, openMinute, closeHour, closeMinute, openDays });
                    } else {
                        console.error("❌ Business hours document not found!");
                    }
                }).catch((error) => console.error("❌ Firestore fetch error:", error));
            }

            function checkTime(businessHours) {
                const now = new Date();
                const day = now.getDay();
                const hours = now.getHours();
                const minutes = now.getMinutes();

                //const isBusinessDay = (day === 0 || (day >= 2 && day <= 6)); // Tues - Sun
                // const isBusinessDay = (day === 0 || (day >= 3 && day <= 7)); // Open on Wed-Sun
                // 🔹 NEW: drive open/closed days from Firestore
                const isBusinessDay = Array.isArray(businessHours.openDays) && businessHours.openDays.includes(day);

                const { openHour, openMinute, closeHour, closeMinute } = businessHours;

                // Check if current time is within open hours
                const isOpenHours = isBusinessDay &&
                    (hours > openHour || (hours === openHour && minutes >= openMinute)) &&
                    (hours < closeHour || (hours === closeHour && minutes < closeMinute));

                console.log(`🕒 NOW: ${hours}:${minutes} | OPEN: ${openHour}:${openMinute} - ${closeHour}:${closeMinute} | isOpenHours: ${isOpenHours}`);
                console.log(`✅ Is Today a Business Day? ${isBusinessDay}`);

                if (!isOpenHours) {
                    console.log("🔴 Store is CLOSED - Redirecting to early.html");
                    setTimeout(() => { window.location.href = "early.html"; }, 500);
                }
            }

            fetchBusinessHours(checkTime);
            setInterval(() => fetchBusinessHours(checkTime), 60000);
        });
    </script>

    <script>
        // Snow & Flag Animation (live-toggle via Firestore)
        document.addEventListener('DOMContentLoaded', () => {
            let snowContainer = null;
            const particleCount = 150; // density

            function createParticle(isFlag) {
                const particle = document.createElement('div');
                particle.classList.add(isFlag ? 'italian-flag' : 'snowflake');

                const startLeft = Math.random() * 100;
                const duration = Math.random() * 5 + 3;
                const delay = Math.random() * 5;
                const size = Math.random() * 4 + 3;

                particle.style.left = `${startLeft}%`;
                particle.style.animation = `snowfall ${duration}s linear infinite`;
                particle.style.animationDelay = `-${delay}s`;

                if (!isFlag) {
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                }

                snowContainer.appendChild(particle);
            }

            function enableSnow() {
                if (!snowContainer) {
                    snowContainer = document.createElement('div');
                    snowContainer.id = 'snow-container';
                    document.body.appendChild(snowContainer);
                }

                snowContainer.innerHTML = '';

                for (let i = 0; i < particleCount; i++) {
                    createParticle(i % 6 === 0); // 1 out of 6 = flag
                }
            }

            function disableSnow() {
                if (snowContainer) {
                    snowContainer.remove();
                    snowContainer = null;
                }
            }

            // Firestore live toggle
            const snowDocRef = db.collection('signageSettings').doc('snowEffect');

            snowDocRef.onSnapshot(doc => {
                const data = doc.exists ? doc.data() : {};
                const enabled = (data.enabled !== false);

                if (enabled) enableSnow();
                else disableSnow();
            });

            // === NEW: Heart & Flag Animation Logic (Separate System) ===
            let heartContainer = null;

            function createHeartParticle(isFlag) {
                const particle = document.createElement('div');
                particle.classList.add(isFlag ? 'italian-flag' : 'heart');

                const startLeft = Math.random() * 100;
                const duration = Math.random() * 5 + 3;
                const delay = Math.random() * 5;
                const size = Math.random() * 4 + 3; // relevant for sizing if needed

                particle.style.left = `${startLeft}%`;
                particle.style.animation = `snowfall ${duration}s linear infinite`;
                particle.style.animationDelay = `-${delay}s`;

                // If it's a heart or flag, we might want to ensure they are visible
                // The .heart class already has fixed width/height in CSS, but we can randomize slightly if desired.
                // For now, keeping "same exact style" means relying on the CSS classes mostly.

                if (!isFlag) {
                    // Start scaling for variety if desired, or keep uniform. 
                    // The CSS for .heart already defines a 10px size. 
                    // Let's rely on CSS to match "same exact style" request, 
                    // but the snow logic sets width/height. 
                    // Let's set it to ensure consistency if the user wants variance.
                    // However, CSS transform scale might be better for hearts to separate size from shape.
                    // But to be safe and simple:
                    // particle.style.transform += ` scale(${Math.random() * 0.5 + 0.8})`; 
                    // Since the CSS has rotation, we append scale.
                    // Actually, let's just stick to the CSS size for hearts to be safe/clean.
                }

                heartContainer.appendChild(particle);
            }

            function enableHearts() {
                if (!heartContainer) {
                    heartContainer = document.createElement('div');
                    heartContainer.id = 'heart-container';
                    heartContainer.style.position = 'fixed'; // Ensure it has same container props
                    heartContainer.style.top = '0';
                    heartContainer.style.left = '0';
                    heartContainer.style.width = '100%';
                    heartContainer.style.height = '100%';
                    heartContainer.style.pointerEvents = 'none';
                    heartContainer.style.zIndex = '9999';
                    heartContainer.style.overflow = 'hidden';
                    document.body.appendChild(heartContainer);
                }

                heartContainer.innerHTML = '';

                for (let i = 0; i < particleCount; i++) {
                    createHeartParticle(i % 6 === 0); // 1 out of 6 = flag
                }
            }

            function disableHearts() {
                if (heartContainer) {
                    heartContainer.remove();
                    heartContainer = null;
                }
            }

            const heartDocRef = db.collection('signageSettings').doc('heartEffect');

            heartDocRef.onSnapshot(doc => {
                const data = doc.exists ? doc.data() : {};
                const enabled = (data.enabled === true); // Default to false if not present, or match snow logic?
                // Snow defaults to true if missing (in admin), but false makes sense for a NEW feature to not auto-on.
                // However, admin script defaults snow to true if missing.
                // Let's follow the data.

                if (enabled) enableHearts();
                else disableHearts();
            });
        });
    </script>
